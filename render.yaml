services:
  - type: web
    name: cook-and-chill
    env: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run prisma:deploy
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
